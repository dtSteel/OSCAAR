version: "3.9"

services:

  api:
    build: .
    container_name: oscaar_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_data:/app/chroma_data
      - ./batch_inbox:/app/batch_inbox
      - ./keys:/app/keys
      - ./GeoLite2-Country.mmdb:/app/GeoLite2-Country.mmdb
      - ./templates:/app/templates
    depends_on:
      - redis
      - mailpit
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: oscaar_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./chroma_data:/app/chroma_data
      - ./batch_inbox:/app/batch_inbox
      - ./keys:/app/keys
      - ./GeoLite2-Country.mmdb:/app/GeoLite2-Country.mmdb
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2

  redis:
    image: redis:7-alpine
    container_name: oscaar_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: oscaar_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  redis_data:
